<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GD-DOOM WASM ALPHA</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background:
        radial-gradient(circle at top, #3a0d0d 0%, #170707 38%, #050505 100%);
      color: #ddd;
      font: 16px/1.4 monospace;
    }
    .shell {
      position: fixed;
      inset: 0;
      border: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.22), rgba(0, 0, 0, 0.72)),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.035) 0,
          rgba(255, 255, 255, 0.035) 2px,
          transparent 2px,
          transparent 4px
        );
    }
    .overlay[hidden] {
      display: none;
    }
    .utilitybar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .wad-button {
      padding: 10px 14px;
      border: 2px solid #ffc24b;
      background: rgba(24, 8, 8, 0.92);
      color: #fff0c9;
      font: 700 13px/1 monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }
    .wad-button:hover,
    .wad-button:focus-visible {
      background: rgba(52, 14, 10, 0.96);
      border-color: #ffe49b;
      outline: none;
    }
    .wad-status {
      max-width: min(320px, calc(100vw - 32px));
      padding: 8px 10px;
      border: 1px solid rgba(255, 194, 75, 0.65);
      background: rgba(0, 0, 0, 0.82);
      color: #f0d5a6;
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
    }
    .wad-status:empty {
      display: none;
    }
    .card {
      width: min(560px, 100%);
      padding: 28px 24px 22px;
      border: 3px solid #6e1b1b;
      background: rgba(10, 10, 10, 0.88);
      box-shadow: 0 0 0 2px #1a1a1a, 0 18px 60px rgba(0, 0, 0, 0.45);
      text-align: center;
    }
    .logo {
      margin: 0 0 14px;
      color: #ff533d;
      font-size: clamp(36px, 10vw, 72px);
      line-height: 0.92;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 2px 0 #7f1105, 0 4px 0 #4a0902, 0 0 22px rgba(255, 73, 31, 0.28);
    }
    .subtitle {
      margin: 0 0 18px;
      color: #f0d5a6;
      font-size: 14px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .prompt {
      margin: 0;
      color: #fff3cf;
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: pulse 1s steps(2, end) infinite;
    }
    .hint {
      margin: 14px 0 0;
      color: #b7a7a7;
      font-size: 13px;
    }
    .repo-link {
      display: inline-block;
      margin: 16px 0 0;
      padding: 7px 12px 8px;
      border: 1px solid #a43a22;
      background: rgba(34, 10, 10, 0.82);
      color: #ffd9a0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
    }
    .repo-link:hover,
    .repo-link:focus-visible {
      border-color: #ffc24b;
      color: #fff3cf;
      background: rgba(64, 18, 10, 0.92);
      outline: none;
    }
    .controls {
      position: relative;
      margin: 24px 0 0;
      padding: 28px 18px 16px;
      border: 3px solid #ffc24b;
      background:
        linear-gradient(180deg, rgba(94, 22, 5, 0.95), rgba(25, 8, 4, 0.96));
      box-shadow:
        inset 0 0 0 2px rgba(255, 240, 188, 0.16),
        0 0 0 2px rgba(107, 24, 5, 0.95),
        0 0 28px rgba(255, 164, 53, 0.24),
        0 16px 34px rgba(0, 0, 0, 0.38);
      color: #ffe4b9;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: left;
    }
    .controls-title {
      position: absolute;
      top: -14px;
      left: 14px;
      padding: 3px 10px 4px;
      border: 2px solid #ffe49b;
      background: linear-gradient(180deg, #ffd871, #d36d18);
      color: #2a1002;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.16em;
      text-shadow: none;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    }
    .controls strong {
      display: inline-block;
      min-width: 86px;
      margin-right: 10px;
      color: #fff8dc;
      font-weight: 800;
    }
    .controls kbd {
      display: inline-block;
      margin: 0 4px 0 0;
      padding: 2px 8px 3px;
      border: 1px solid #f2b45d;
      border-bottom-width: 2px;
      background: linear-gradient(180deg, #ffe0ad, #c97b32);
      color: #2b1204;
      font: inherit;
      font-weight: 800;
      line-height: 1.2;
      text-shadow: none;
      vertical-align: baseline;
    }
    .controls .sep {
      display: inline-block;
      margin: 0 6px;
      color: #ffd9a0;
    }
    @keyframes pulse {
      50% {
        opacity: 0.45;
      }
    }
  </style>
</head>
<body>
  <div class="utilitybar" aria-label="Browser WAD controls">
    <button id="local-wad-button" class="wad-button" type="button">Load Local WAD</button>
    <input id="local-wad-input" type="file" accept=".wad,.WAD" multiple hidden>
    <div id="local-wad-status" class="wad-status" aria-live="polite"></div>
  </div>
  <iframe
    id="game-shell"
    class="shell"
    title="GD-DOOM WASM"
    allow="autoplay; fullscreen"
    tabindex="0"
    src="./player.html"
  ></iframe>
  <div id="splash" class="overlay">
    <section class="card" aria-label="Click to play">
      <h1 class="logo">GD-DOOM</h1>
      <p class="subtitle">WASM Alpha</p>
      <p class="prompt">Click To Play</p>
      <p class="hint">The click page stays here until the game frame is focused.</p>
      <p class="hint">Use Load Local WAD to add browser-selected WAD files to the picker.</p>
      <a class="repo-link" href="https://github.com/Distortions81/GD-DOOM" target="_blank" rel="noreferrer">View GitHub Repo</a>
      <p class="controls">
        <span class="controls-title">Controls</span>
        <strong>Menus:</strong> <kbd>Arrow Keys</kbd><span class="sep">+</span><kbd>Enter</kbd><br>
        <strong>Game:</strong> <kbd>WASD</kbd><span class="sep">+</span><kbd>Mouse</kbd>
      </p>
    </section>
  </div>
  <script src="./launch.js"></script>
</body>
</html>
