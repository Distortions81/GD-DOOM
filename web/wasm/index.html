<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GD-DOOM WASM ALPHA</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #111;
      color: #ddd;
      font: 16px/1.4 monospace;
    }
    main {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    p {
      position: fixed;
      left: 12px;
      top: 12px;
      margin: 0;
      z-index: 1;
      background: rgba(0, 0, 0, 0.65);
      padding: 6px 8px;
      border: 1px solid #444;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      border: 1px solid #444;
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
  <main>
  </main>
  <script src="./wasm_exec.js"></script>
  <script src="./launch.js"></script>
</body>
</html>
